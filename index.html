    <!-- Fraunces trimmed to the weights actually used (300-900 upright, 400-600 italic);
         Instrument Sans replaces Inter as the UI/body face.
         Loaded asynchronously (media="print" flips to "all" on load) so the font
         CSS never blocks first paint; display=swap paints fallback text
         immediately and swaps in the webfont when it arrives. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400..600&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      media="print"

  <body>
    <!--
      Netlify Forms detection stub. This is a Vite SPA, so the real contact form
      is rendered by React at runtime and Netlify's build-time crawler can't see
      it. This hidden static form (matching name + fields) lets Netlify register
      the "contact" form at deploy time; the React ContactForm then POSTs to it.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <div id="root"></div>
