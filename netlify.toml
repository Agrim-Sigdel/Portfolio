[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"

# SPA fallback: client-side routes like /cv, /normal, /terminal have no file on
# disk, so serve index.html for any unmatched path and let React Router resolve
# it. Without this, refreshing or deep-linking a route 404s.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Vite emits content-hashed filenames under /assets — safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html must always revalidate so new deploys pick up the new asset hashes.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
